name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: |
          python -m py_compile llm_ingest.py llm_ingest_app.pyw llm_knowledge_graph.py llm_pdf_cleanup.py llm_figure_cleanup.py llm_audit_assertions.py llm_quality_report.py llm_benchmark.py llm_structured_output.py llm_local_api.py llm_ingest_api_entry.py llm_ingest_worker_entry.py pdf_worker_runner.py marker_sidecar_runner.py
          python -m compileall -q src

      - name: Unit tests
        run: |
          python -m unittest discover -s tests
